version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: carbonxchange_postgres
    environment:
      POSTGRES_DB: carbonxchange
      POSTGRES_USER: carbonxchange
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carbonxchange_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - carbonxchange_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbonxchange -d carbonxchange"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: carbonxchange_redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-carbonxchange_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - carbonxchange_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-carbonxchange_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CarbonXchange Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VERSION: ${VERSION:-1.0.0}
    container_name: carbonxchange_backend
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      DATABASE_URL: postgresql://carbonxchange:${POSTGRES_PASSWORD:-carbonxchange_password}@postgres:5432/carbonxchange
      REDIS_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/3
      RATELIMIT_STORAGE_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/1
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FEATURE_BLOCKCHAIN_INTEGRATION: ${FEATURE_BLOCKCHAIN_INTEGRATION:-false}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carbonxchange_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carbonxchange_celery_worker
    command: >
      celery -A src.main.celery worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=4
      --max-tasks-per-child=1000
      -Q default,high_priority,low_priority
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      DATABASE_URL: postgresql://carbonxchange:${POSTGRES_PASSWORD:-carbonxchange_password}@postgres:5432/carbonxchange
      REDIS_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carbonxchange_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  # Celery Beat for Scheduled Tasks
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carbonxchange_celery_beat
    command: >
      celery -A src.main.celery beat
      --loglevel=${LOG_LEVEL:-info}
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      DATABASE_URL: postgresql://carbonxchange:${POSTGRES_PASSWORD:-carbonxchange_password}@postgres:5432/carbonxchange
      REDIS_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-carbonxchange_redis_password}@redis:6379/3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - carbonxchange_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: carbonxchange_nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - carbonxchange_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  carbonxchange_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
